          "config between any two of them. The currently-connected database ",
          "is auto-registered on first load."),
      ),
    ));

    // ---- Card 1: registry list ----
    const listCard = h("div", { class: "card" });
    listCard.appendChild(h("div", { class: "card-header" },
      h("h2", null, "Registered databases"),
      h("span", { class: "hint", id: "db-count" }, "")));
    const listBody = h("div", { class: "card-body" });
    listCard.appendChild(listBody);
    root.appendChild(listCard);

    listBody.appendChild(h("div", { class: "muted", style: "padding: 8px 0;" },
      "Loading…"));

    // ---- Card 2: sync ----
    const syncCard = h("div", { class: "card", id: "sync-card",
      style: "display: none" });
    syncCard.appendChild(h("div", { class: "card-header" },
      h("h2", null, "Sync between databases")));
    const syncBody = h("div", { class: "card-body" });
    syncCard.appendChild(syncBody);
    root.appendChild(syncCard);

    // ---- Card 3: analysis ----
    const analysisCard = h("div", { class: "card", style: "display: none" });
    const analysisStamp = h("span", { class: "hint" }, "");
    analysisCard.appendChild(h("div", { class: "card-header" },
      h("h2", null, "Analysis"), analysisStamp));
    const analysisBody = h("div", { class: "card-body" });
    analysisCard.appendChild(analysisBody);
    root.appendChild(analysisCard);

    let cachedView = null;

    const refresh = async () => {
      try {
        const view = await api("GET", "/api/databases");
        cachedView = view;
        renderList(view);
        renderSync(view);
      } catch (err) {
        listBody.innerHTML = "";
        listBody.appendChild(h("div", { class: "muted", style: "color: var(--danger)" },
          err.status === 404
            ? "Database endpoints not available — restart the admin server to pick up the new build."
            : "Load failed: " + err.message));
      }
    };

    // -------- Render: registered DB list --------
    const renderList = (view) => {
      listBody.innerHTML = "";
      const counter = document.getElementById("db-count");
      if (counter) counter.textContent =
        `${view.entries.length} registered`;

      const tbl = h("table", { class: "data" });
      tbl.appendChild(h("thead", null, h("tr", null,
        h("th", null, "Label"),
        h("th", null, "DSN (masked)"),
        h("th", null, "Status"),
        h("th", null, "Added"),
        h("th", null, ""),
      )));
      const tb = h("tbody");
      for (const e of view.entries) {
        const badges = h("div", { class: "row", style: "gap: 4px; flex-wrap: wrap" });
        if (e.is_current)
          badges.appendChild(h("span", { class: "badge ok",
            title: "The admin process is currently connected here" },
            h("span", { class: "dot" }), "in use"));
        if (e.is_primary)
          badges.appendChild(h("span", { class: "badge",
            title: "Marked as primary on next restart" }, "primary"));
        if (!e.is_current && !e.is_primary)
          badges.appendChild(h("span", { class: "muted" }, "—"));

        const actions = h("td", { class: "actions" });
        actions.appendChild(h("button", { class: "btn btn-sm",
          title: "Probe connectivity",
          onclick: () => testDb(e.id) }, "Test"));
        if (App.mode === "readwrite") {
          actions.appendChild(h("button", { class: "btn btn-sm",
            onclick: () => openEditDbModal(e) }, "Edit"));
          if (!e.is_primary) {
            actions.appendChild(h("button", { class: "btn btn-sm",
              title: "Mark as preferred for next admin restart",
              onclick: () => setPrimary(e.id) }, "Set primary"));
          }
          if (!e.is_current) {
            actions.appendChild(h("button", { class: "btn btn-sm btn-danger",
              onclick: () => deleteDb(e) }, "Delete"));
          }
        }

        tb.appendChild(h("tr", null,
          h("td", null, e.label || "—"),
          h("td", { class: "mono", style: "font-size: 11.5px; max-width: 480px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;",
            title: e.dsn_masked || "" }, e.dsn_masked || "—"),
          h("td", null, badges),
          h("td", { class: "muted", style: "font-size: 12px" },
            fmtRelative(e.added_at) || "—"),
          actions,
        ));
      }
      tbl.appendChild(tb);
      const wrap = h("div", { class: "table-wrap" });
      wrap.appendChild(tbl);
      listBody.appendChild(wrap);

      // Add button
      if (App.mode === "readwrite") {
        listBody.appendChild(h("div", { style: "margin-top: 12px" },
          h("button", { class: "btn btn-primary",
            onclick: () => openAddDbModal() }, "+ Add database")));
      }

      if (view.last_sync) {
        const ls = view.last_sync;
        const fromLabel = (view.entries.find(e => e.id === ls.from_id) || {}).label || ls.from_id || "?";
        const toLabel = (view.entries.find(e => e.id === ls.to_id) || {}).label || ls.to_id || "?";
        listBody.appendChild(h("div", { class: "muted",
          style: "margin-top: 12px; font-size: 12px" },
          `Last sync: ${fromLabel} → ${toLabel} · `,
          `${ls.totals_applied || 0} rows · ${fmtRelative(ls.at)}`));
      }
    };

    // -------- Render: sync picker --------
    const renderSync = (view) => {
      syncBody.innerHTML = "";
      if (view.entries.length < 2) {
        syncCard.style.display = "none";
        return;
      }
      syncCard.style.display = "";

      // Default: source = current, target = first non-current
      const defaultSourceId = view.current_id || view.entries[0].id;
      const defaultTargetId = (view.entries.find(e => e.id !== defaultSourceId) || {}).id;

      const buildSelect = (id, defaultId) => {
        const sel = h("select", { class: "select", id });
        for (const e of view.entries) {
          const opt = h("option", { value: e.id },
            e.label + (e.is_current ? " (in use)" : ""));
          if (e.id === defaultId) opt.selected = true;
          sel.appendChild(opt);
        }
        return sel;
      };
      const sourceSel = buildSelect("sync-source", defaultSourceId);
      const targetSel = buildSelect("sync-target", defaultTargetId);
      // Avoid same-source/target by reactively swapping.
      sourceSel.onchange = () => {
        if (sourceSel.value === targetSel.value) {
          const next = view.entries.find(e => e.id !== sourceSel.value);
          if (next) targetSel.value = next.id;
        }
      };
      targetSel.onchange = () => {
        if (sourceSel.value === targetSel.value) {
          const next = view.entries.find(e => e.id !== targetSel.value);
          if (next) sourceSel.value = next.id;
        }
      };

      syncBody.appendChild(h("div", { class: "form-row" },
        h("div", { class: "field" },
          h("label", null, "Source (data of truth)"),
          sourceSel),
        h("div", { class: "field" },
          h("label", null, "Target (will be overwritten on conflicts)"),
          targetSel),
      ));

      const analyzeBtn = h("button", { class: "btn btn-primary",
        onclick: async () => {
          analyzeBtn.disabled = true;
          analyzeBtn.textContent = "Analyzing…";
          try {
            const r = await api("POST", "/api/sync/analyze",
              { from_id: sourceSel.value, to_id: targetSel.value });
            renderAnalysis(r, view);
          } catch (err) {
            toast("error", "Analyze failed", err.message);
          } finally {
            analyzeBtn.disabled = false;
            analyzeBtn.textContent = "Analyze";
          }
        } }, "Analyze");
      syncBody.appendChild(analyzeBtn);
    };

    // -------- Render: analysis result + Apply --------
    const renderAnalysis = (analysis, view) => {
      analysisCard.style.display = "";
      const fromLabel = (view.entries.find(e => e.id === analysis.from_id) || {}).label || analysis.from_id;
      const toLabel = (view.entries.find(e => e.id === analysis.to_id) || {}).label || analysis.to_id;
      analysisStamp.textContent =
        `${fromLabel} → ${toLabel} · ${analysis.totals.insert} insert · ${analysis.totals.overwrite} OVERWRITE · ${analysis.totals.preserve_only_in_target} preserved`;
      analysisBody.innerHTML = "";

      if (analysis.totals.overwrite === 0 && analysis.totals.insert === 0) {
        analysisBody.appendChild(h("div", { class: "empty" },
          h("div", { class: "title" }, "Nothing to sync"),
          h("div", { class: "sub" }, "Source and target are already identical for these tables.")));
        return;
      }

      // Per-table summary
      const summaryTbl = h("table", { class: "data" });
      summaryTbl.appendChild(h("thead", null, h("tr", null,
        h("th", null, "Table"),
        h("th", null, "Insert"),
        h("th", null, "Overwrite"),
        h("th", null, "Preserve (target-only)"),
      )));
      const stb = h("tbody");
      for (const t of analysis.tables) {
        stb.appendChild(h("tr", null,
          h("td", { class: "mono" }, t.table),
          h("td", null, t.insert > 0
            ? h("span", { class: "badge ok" }, String(t.insert))
            : h("span", { class: "muted" }, "0")),
          h("td", null, t.overwrite > 0
            ? h("span", { class: "badge danger" }, String(t.overwrite))
            : h("span", { class: "muted" }, "0")),
          h("td", { class: "muted" }, String(t.preserve_only_in_target)),
        ));
      }
      summaryTbl.appendChild(stb);
      const wrap = h("div", { class: "table-wrap" });
      wrap.appendChild(summaryTbl);
      analysisBody.appendChild(wrap);

      // Per-table overwrite samples
      for (const t of analysis.tables) {
        if (!t.sample_overwrite || !t.sample_overwrite.length) continue;
        analysisBody.appendChild(h("div", { style: "margin: 16px 0 6px; font-weight: 600" },
          `${t.table} — will overwrite (showing ${t.sample_overwrite.length}/${t.overwrite}):`));
        const tbl = h("table", { class: "data" });
        tbl.appendChild(h("thead", null, h("tr", null,
          h("th", null, "PK"),
          h("th", null, "Changed fields"),
          h("th", null, "Before (target)"),
          h("th", null, "After (source)"),
        )));
        const tb = h("tbody");
        for (const s of t.sample_overwrite) {
          tb.appendChild(h("tr", null,
            h("td", { class: "mono" }, Object.entries(s.pk).map(([k, v]) => `${k}=${v}`).join(" ")),
            h("td", { class: "mono", style: "font-size: 11.5px" },
              (s.changed_fields || []).join(", ")),
            h("td", { class: "mono", style: "font-size: 11px; color: var(--danger)" },
              Object.entries(s.before).map(([k, v]) => `${k}=${v}`).join("\n")),
            h("td", { class: "mono", style: "font-size: 11px; color: var(--success, green)" },
              Object.entries(s.after).map(([k, v]) => `${k}=${v}`).join("\n")),
          ));
        }
        tbl.appendChild(tb);
        const wrap2 = h("div", { class: "table-wrap" });
        wrap2.appendChild(tbl);
        analysisBody.appendChild(wrap2);
      }

      // Apply button
      const apply = h("button", { class: "btn btn-danger",
        style: "margin-top: 16px", onclick: async () => {
          const msg =
            `Apply this sync?\n\n` +
            `Source: ${fromLabel}\n` +
            `Target: ${toLabel}\n\n` +
            `${analysis.totals.insert} new rows will be inserted.\n` +
            `${analysis.totals.overwrite} EXISTING rows will be OVERWRITTEN.\n` +
            `${analysis.totals.preserve_only_in_target} target-only rows will be kept.\n\n` +
            `This writes to '${toLabel}'. Irreversible.`;
          if (!confirm(msg)) return;
          apply.disabled = true; apply.textContent = "Applying…";
          try {
            const r = await api("POST", "/api/sync/apply",
              { from_id: analysis.from_id, to_id: analysis.to_id });
            const ok = (r.results || []).reduce((a, b) => a + (b.rows_applied || 0), 0);
            const fail = (r.errors || []).length;
            toast(fail === 0 ? "success" : "info", "Sync complete",
              `${ok} rows applied · ${fail} table(s) failed`);
            await refresh();
            analysisCard.style.display = "none";
          } catch (err) {
            toast("error", "Apply failed", err.message);
          } finally {
            apply.disabled = false; apply.textContent = "Apply sync";
          }
        } }, "Apply sync");
      analysisBody.appendChild(apply);
    };

    // -------- Action handlers --------
    const testDb = async (id) => {
      try {
        const r = await api("POST", `/api/databases/${encodeURIComponent(id)}/test`, {});
        const missing = r.missing_tables || [];
        toast(missing.length ? "info" : "success", "Connection OK",
          missing.length
            ? `Missing tables: ${missing.join(", ")}`
            : `${(r.checked_tables || []).length} sync tables present`);
      } catch (err) {
        toast("error", "Test failed", err.message);
      }
    };

    const setPrimary = async (id) => {
      try {
        const r = await api("PUT", `/api/databases/${encodeURIComponent(id)}/primary`, {});
        toast("success", "Primary set", r.note || "");
        await refresh();
      } catch (err) { toast("error", "Failed", err.message); }
    };

    const deleteDb = async (entry) => {
      if (!confirm(`Delete '${entry.label}'?\n\n${entry.dsn_masked || ""}`)) return;
      try {
        await api("DELETE", `/api/databases/${encodeURIComponent(entry.id)}`);
        toast("success", "Removed", entry.label);
        await refresh();
      } catch (err) { toast("error", "Delete failed", err.message); }
    };

    const openAddDbModal = () => openDbModal(null);
    const openEditDbModal = (entry) => openDbModal(entry);

    const openDbModal = (entry) => {
      const isEdit = !!entry;
      const labelInput = h("input", {
        class: "input", placeholder: "e.g. Production Supabase",
        value: isEdit ? (entry.label || "") : "",
      });
      const dsnInput = h("input", {
        class: "input mono", type: "text",
        placeholder: "postgresql://user:password@host:5432/db?sslmode=require",
        value: "",
      });
      const body = h("div", null,
        h("div", { class: "field" },
          h("label", null, "Label"),
          labelInput),
        h("div", { class: "field" },
          h("label", null, "DSN ",
            isEdit
              ? h("span", { class: "muted", style: "font-size: 11.5px" },
                  " — currently: " + (entry.dsn_masked || "—") + " (leave empty to keep)")
              : null),
          dsnInput),
      );
      const footer = h("div", { class: "row" },
        h("button", { class: "btn", onclick: () => Modal.close() }, "Cancel"),
        h("div", { style: "flex: 1" }),
        h("button", { class: "btn btn-primary", onclick: async () => {
          const label = labelInput.value.trim();
          const dsn = dsnInput.value.trim();
          if (!isEdit && !dsn) { toast("error", "DSN is required"); return; }
          try {
            if (isEdit) {
              const body = {};
              if (label) body.label = label;
              if (dsn) body.dsn = dsn;
              await api("PATCH", `/api/databases/${encodeURIComponent(entry.id)}`, body);
              toast("success", "Updated", label || entry.label);
            } else {
              await api("POST", "/api/databases", { label, dsn });
              toast("success", "Added", label || "Database");
            }
            Modal.close();
            await refresh();
          } catch (err) {
            toast("error", "Save failed", err.message);
          }
        } }, isEdit ? "Save" : "Add"),
      );
      Modal.open({ title: isEdit ? `Edit ${entry.label}` : "Add database", body, footer });
    };

    refresh();
  }

  // ---------------------------------------------------------------------------
  // Router
  // ---------------------------------------------------------------------------

  const routes = {
    "#/dashboard": renderDashboard,
    "#/routes": renderRoutesView,
    "#/certificates": renderCertificatesView,
    "#/zones": renderZonesView,
    "#/nodes": renderNodesView,
    "#/services": renderServicesView,
    "#/static-ips": renderStaticIpsView,
    "#/ssh-keys": renderSshKeysView,
    "#/databases": renderDatabasesView,
    "#/logs": renderLogsView,
    "#/settings": renderSettingsView,
  };

  function navigate() {
    if (App._leaveCurrent) { try { App._leaveCurrent(); } catch (_) {} App._leaveCurrent = null; }
    const hash = location.hash || "#/dashboard";
    const render = routes[hash] || renderDashboard;
    const root = document.getElementById("view-root");
    render(root, {});
  }

  window.addEventListener("hashchange", navigate);

  document.getElementById("logout-btn").addEventListener("click", () => {
    Store.clearToken();
    showLogin();
  });

  function showLogin() {
    document.getElementById("app").classList.add("hidden");
    document.getElementById("login").classList.add("open");
    const tokenEl = document.getElementById("login-token");
    setTimeout(() => tokenEl.focus(), 50);
  }

  function hideLogin() {
    document.getElementById("login").classList.remove("open");
    document.getElementById("app").classList.remove("hidden");
  }

  async function verifyAndEnter() {
    try {
      await api("GET", "/api/overview");
      hideLogin();
      await refreshOverview();
      navigate();
      return true;
    } catch (err) {
      if (err.status === 401) showLogin();
      else toast("error", "Connection error", err.message);
      return false;
    }
  }

  document.getElementById("login-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const token = document.getElementById("login-token").value.trim();
    const remember = document.getElementById("login-remember").checked;
    if (!token) return;
    Store.setToken(token, remember);
    const errEl = document.getElementById("login-error");
    errEl.textContent = "";
    try {
      await api("GET", "/api/overview");
      document.getElementById("login-token").value = "";
      hideLogin();
      await refreshOverview();
      if (!location.hash) location.hash = "#/dashboard";
      navigate();
    } catch (err) {
      errEl.textContent = err.status === 401 ? "Invalid token." : ("Could not connect: " + err.message);
      Store.clearToken();
    }
  });

  // Boot
  if (!Store.getToken()) {
    showLogin();
  } else {
    verifyAndEnter().then(ok => { if (ok && !location.hash) location.hash = "#/dashboard"; });
  }

  // Refresh sidebar periodically
  setInterval(() => { if (!document.hidden && !document.getElementById("login").classList.contains("open")) refreshOverview(); }, 15000);

})();
</script>

</body>
</html>
