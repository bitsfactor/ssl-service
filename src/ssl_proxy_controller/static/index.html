        const haveAnyKey = key || linkedIds.length > 0;

        if (auth === "password" && !pwd) { toast("error", "Password required"); return; }
        if (auth === "key" && !haveAnyKey) {
          toast("error", "No SSH key", "Pick at least one from the list, or paste an ad-hoc key");
          return;
        }
        if (auth === "auto" && !pwd && !haveAnyKey) {
          toast("error", "Need at least one credential",
            "Provide password, link a key, or paste one for Auto mode");
          return;
        }

        // Init defaults section — only push when the section is open OR
        // we already have an existing record (so values are pre-populated).
        // Always include them on edit; we send the current values regardless.
        const initPort = parseInt(document.getElementById("node-init-port").value || "60101", 10);
        payload.init_desired_ssh_port = initPort;
        payload.init_timezone = document.getElementById("node-init-tz").value.trim() || "Asia/Shanghai";
        payload.init_git_user_name = document.getElementById("node-init-gitname").value.trim() || null;
        payload.init_git_user_email = document.getElementById("node-init-gitemail").value.trim() || null;
        payload.init_git_private_key = document.getElementById("node-init-gitkey").value.trim() || null;
        payload.init_install_codex = document.getElementById("node-init-codex").checked;
        payload.init_codex_base_url = document.getElementById("node-init-codexurl").value.trim() || null;
        payload.init_codex_api_key = document.getElementById("node-init-codexkey").value.trim() || null;
        try {
          const enteredName = document.getElementById("node-name").value.trim();
          if (isEdit) {
            // If user changed the name, send it as `new_name` so the backend
            // routes through the rename path.
            if (enteredName && enteredName !== existing.name) {
              payload.new_name = enteredName;
            }
            await api("PATCH", `/api/nodes/${encodeURIComponent(existing.name)}`, payload);
          } else {
            payload.name = enteredName;
            await api("POST", "/api/nodes", payload);
          }
          Modal.close();
          const finalName = enteredName || (existing && existing.name);
          toast("success", isEdit ? "Node updated" : "Node added", finalName);
          if (onSaved) {
            await onSaved({
              name: finalName,
              oldName: isEdit ? existing.name : finalName,
              isEdit,
            });
          }
        } catch (err) { toast("error", "Save failed", err.message); }
      } }, isEdit ? "Save" : "Add node"),
    );
    Modal.open({ title: isEdit ? `Edit ${existing.name}` : "Add node", body: form, footer });
  }

  // Modal that runs deploy/update with a previewable command + streams the
  // result inline.
  function openNodeRunModal(node, kind) {
    const defaultCmd = kind === "deploy"
      ? (node.deploy_command || "")
      : (node.update_command || "");
    const form = h("div");
    form.appendChild(h("div", { class: "field" },
      h("label", null, kind === "deploy" ? "Deploy command" : "Update command",
        h("span", { class: "hint" }, " — leave blank to use the configured default")),
      h("textarea", { id: "run-cmd", class: "textarea mono", rows: "4",
        value: defaultCmd, placeholder: "Will use the built-in default if left empty" }),
    ));
    form.appendChild(h("div", { class: "muted", style: "font-size: 12px; margin-top: 6px" },
      `Connects to ${node.ssh_user}@${node.host}:${node.ssh_port} via ${node.auth_method} auth`));
    const out = h("pre", { class: "log-viewer", style: "margin-top: 12px; max-height: 360px;" },
      h("span", { class: "dim" }, "(no output yet — click Run to execute)"));
    form.appendChild(out);

    let running = false;
    const runBtn = h("button", { class: "btn btn-primary", onclick: async (e) => {
      e.preventDefault();
      if (running) return;
      running = true;
      runBtn.disabled = true;
      runBtn.textContent = "Running…";
      out.innerHTML = "";
      out.appendChild(h("span", { class: "dim" }, "Running on " + node.host + " …\n"));
      const command = document.getElementById("run-cmd").value.trim();
      const path = `/api/nodes/${encodeURIComponent(node.name)}/${kind}`;
      try {
        const r = await api("POST", path, command ? { command } : {});
        out.innerHTML = "";
        out.appendChild(h("div", { class: "dim" }, `$ ${r.command}\n`));
        if (r.stdout) out.appendChild(document.createTextNode(r.stdout));
        if (r.stderr) {
          const e = h("span", { style: "color: #ff8c5c" }, "\n" + r.stderr);
          out.appendChild(e);
        }
        out.appendChild(h("div", { class: "dim", style: "margin-top: 8px" },
          `\n[exit ${r.exit_code} · ${r.duration_seconds}s]`));
        toast(r.exit_code === 0 ? "success" : "error",
          (kind === "deploy" ? "Deploy" : "Update") + (r.exit_code === 0 ? " complete" : " failed"),
          `exit ${r.exit_code}`);
      } catch (err) {
        out.innerHTML = "";
        out.appendChild(h("span", { style: "color: var(--danger)" }, err.message));
        toast("error", (kind === "deploy" ? "Deploy" : "Update") + " failed", err.message);
      } finally {
        running = false;
        runBtn.disabled = false;
        runBtn.textContent = "Run";
      }
    } }, "Run");

    const footer = h("div", { class: "row" },
      h("button", { class: "btn", onclick: () => Modal.close() }, "Close"),
      runBtn,
    );
    Modal.open({ title: `${kind === "deploy" ? "Deploy" : "Update"} on ${node.name}`, body: form, footer });
  }

  // ----- Deploy a registered service -----

  async function openDeployServiceModal(node) {
    let services = [];
    try {
      services = (await api("GET", "/api/services")).services || [];
    } catch (err) { toast("error", "Could not load services", err.message); return; }
    if (!services.length) {
      toast("error", "No services", "Add one in the Services tab first.");
      return;
    }

    const wrap = h("div");
    wrap.appendChild(h("div", { class: "muted", style: "margin-bottom: 12px; font-size: 13px" },
      `Pick a service to deploy on ${node.name} (${node.host}). The admin will SSH in, clone the repo, write a .env, and run docker compose up -d --build.`));

    // Service picker
    const sel = h("select", { id: "ds-svc", class: "select", style: "width: 100%" });
    for (const s of services) {
      sel.appendChild(h("option", { value: s.name }, `${s.display_name} (${s.name})`));
    }
    wrap.appendChild(h("div", { class: "field" }, h("label", null, "Service"), sel));

    const branchInput = h("input", { id: "ds-branch", class: "input mono" });
    wrap.appendChild(h("div", { class: "field" },
      h("label", null, "Branch"), branchInput));

    const envText = h("textarea", { id: "ds-env", class: "textarea mono", rows: "8",
      placeholder: "KEY=value (one per line). These OVERRIDE the service defaults." });
    wrap.appendChild(h("div", { class: "field" },
      h("label", null, "Per-deployment env overrides"),
      envText,
      h("div", { class: "muted", style: "font-size: 12px; margin-top: 4px" },
        "Service defaults are merged with these overrides; overrides win.")));

    const rebuild = h("input", { type: "checkbox", id: "ds-rebuild", checked: true });
    wrap.appendChild(h("div", { class: "field inline-checkbox" }, rebuild,
      h("label", { for: "ds-rebuild", style: "margin: 0" }, "Rebuild image (--build)")));

    const cmdPreview = h("pre", { class: "log-viewer", id: "ds-preview", style: "max-height: 200px; font-size: 11.5px" });
    wrap.appendChild(h("div", { class: "field" },
      h("label", null, "Generated command preview"),
      cmdPreview,
      h("div", { class: "muted", style: "font-size: 12px; margin-top: 4px" },
        "Click Preview to render. Click Run to execute via SSH.")));

    const out = h("pre", { class: "log-viewer", id: "ds-out", style: "max-height: 280px; font-size: 11.5px" });
    wrap.appendChild(out);

    const refreshDefaultsForService = (svcName) => {
      const svc = services.find(s => s.name === svcName);
      if (!svc) return;
      branchInput.value = svc.default_branch || "main";
      // Don't overwrite user-typed env; only show defaults as placeholder text.
      envText.placeholder = "Service defaults:\n" +
        Object.entries(svc.default_env || {}).map(([k, v]) => `${k}=${v}`).join("\n") +
        "\n\nWrite KEY=value lines here to override.";
    };
    sel.addEventListener("change", () => refreshDefaultsForService(sel.value));
    refreshDefaultsForService(sel.value);

    async function build(dryRun) {
      const payload = {
        service: sel.value,
        branch: branchInput.value.trim() || undefined,
        env_overrides: envTextToDict(envText.value),
        rebuild: rebuild.checked,
        dry_run: dryRun,
      };
      return api("POST", `/api/nodes/${encodeURIComponent(node.name)}/deploy-service`, payload);
    }

    const previewBtn = h("button", { class: "btn", onclick: async (e) => {
      e.preventDefault();
      cmdPreview.textContent = "Building…";
      try {
        const r = await build(true);
        cmdPreview.textContent = r.command;
      } catch (err) { cmdPreview.textContent = "ERROR: " + err.message; }
    } }, "Preview");

    let running = false;
    const runBtn = h("button", { class: "btn btn-primary", onclick: async (e) => {
      e.preventDefault();
      if (running) return;
      running = true;
      runBtn.disabled = true;
      runBtn.textContent = "Running…";
      out.textContent = "Running on " + node.host + " …\n";
      try {
        const r = await build(false);
        out.textContent = "";
        if (r.stdout) out.appendChild(document.createTextNode(r.stdout));
        if (r.stderr) {
          out.appendChild(h("span", { style: "color: #ff8c5c" }, "\n--- stderr ---\n" + r.stderr));
        }
        out.appendChild(h("div", { class: "muted", style: "margin-top: 8px" },
          `\n[exit ${r.exit_code} · ${r.duration_seconds}s]`));
        toast(r.exit_code === 0 ? "success" : "error",
          "Deploy " + (r.exit_code === 0 ? "complete" : "failed"),
          `${r.service} → ${r.node}, exit ${r.exit_code}`);
      } catch (err) {
        out.textContent = "ERROR: " + err.message;
        toast("error", "Deploy failed", err.message);
      } finally {
        running = false;
        runBtn.disabled = false;
        runBtn.textContent = "Run";
      }
    } }, "Run");

    const footer = h("div", { class: "row" },
      h("button", { class: "btn", onclick: () => Modal.close() }, "Close"),
      previewBtn,
      runBtn,
    );
    Modal.open({ title: `Deploy service on ${node.name}`, body: wrap, footer });
  }

  // ----- Init runs history -----

  function initRunBadge(status) {
    if (status === "success") return h("span", { class: "badge ok" }, h("span", { class: "dot" }), "success");
    if (status === "failed") return h("span", { class: "badge danger" }, h("span", { class: "dot" }), "failed");
    if (status === "cancelled") return h("span", { class: "badge" }, "cancelled");
    if (status === "running") return h("span", { class: "badge info" }, h("span", { class: "dot" }), "running");
    return h("span", { class: "badge" }, status || "queued");
  }

  function fmtDuration(start, end) {
    if (!start) return "—";
    const a = new Date(start);
    const b = end ? new Date(end) : new Date();
    if (Number.isNaN(a.getTime()) || Number.isNaN(b.getTime())) return "—";
    const sec = Math.max(0, Math.round((b.getTime() - a.getTime()) / 1000));
    if (sec < 60) return sec + "s";
    return Math.floor(sec / 60) + "m " + (sec % 60) + "s";
  }

  async function openInitHistoryModal(node) {
    const wrap = h("div");
    wrap.appendChild(h("div", { class: "muted", style: "margin-bottom: 12px; font-size: 13px" },
      `Last 20 runs for ${node.name}. Click any row to expand the full log.`));
    const listWrap = h("div", { id: "init-history-list" }, h("span", { class: "loader" }));
    wrap.appendChild(listWrap);

    const footer = h("div", { class: "row" },
      h("button", { class: "btn", onclick: async () => {
        listWrap.innerHTML = "";
        listWrap.appendChild(h("span", { class: "loader" }));
        await fetchAndRender();
      } }, "Refresh"),
      h("button", { class: "btn btn-primary", onclick: () => Modal.close() }, "Close"),
    );

    async function fetchAndRender() {
      try {
        const resp = await api("GET", `/api/nodes/${encodeURIComponent(node.name)}/init/runs`);
        const runs = resp.runs || [];
        listWrap.innerHTML = "";
        if (!runs.length) {
          listWrap.appendChild(h("div", { class: "empty" },
            h("div", { class: "title" }, "No init runs yet"),
            h("div", { class: "sub" }, "Click Initialize on the node to start one.")));
          return;
        }
        const table = h("table", { class: "data" });
        table.appendChild(h("thead", null,
          h("tr", null,
            h("th", null, "#"),
            h("th", null, "Started"),
            h("th", null, "Status"),
            h("th", null, "Step"),
            h("th", null, "Exit"),
            h("th", null, "Duration"),
            h("th", null, ""),
          ),
        ));
        const tbody = h("tbody");
        for (const run of runs) {
          tbody.appendChild(h("tr", null,
            h("td", { class: "mono" }, "#" + run.id),
            h("td", { class: "muted" }, fmtRelative(run.started_at)),
            h("td", null, initRunBadge(run.status)),
            h("td", { class: "mono", style: "font-size: 11.5px" }, run.current_step || "—"),
            h("td", { class: "mono" }, run.exit_code != null ? String(run.exit_code) : "—"),
            h("td", { class: "muted" }, fmtDuration(run.started_at, run.finished_at)),
            h("td", { class: "actions" },
              h("button", { class: "btn btn-sm",
                onclick: () => openInitRunDetailModal(node, run.id)
              }, "View log"),
            ),
          ));
        }
        table.appendChild(tbody);
        const tw = h("div", { class: "table-wrap" });
        tw.appendChild(table);
        listWrap.appendChild(tw);
      } catch (err) {
        listWrap.innerHTML = "";
        listWrap.appendChild(h("div", { class: "muted" }, "Failed to load: " + err.message));
      }
    }

    Modal.open({ title: `Init history · ${node.name}`, body: wrap, footer });
    fetchAndRender();
  }

  async function openInitRunDetailModal(node, runId) {
    const wrap = h("div");
    const header = h("div", { class: "muted", style: "margin-bottom: 8px; font-size: 13px" }, "Loading…");
    const log = h("pre", { class: "log-viewer", style: "max-height: 480px" });
    wrap.appendChild(header);
    wrap.appendChild(log);

    let pollTimer = null;
    async function refresh() {
      try {
        const r = await api("GET", `/api/nodes/${encodeURIComponent(node.name)}/init/runs/${runId}`);
        header.innerHTML = "";
        header.appendChild(document.createTextNode(`Run #${r.id} · `));
        header.appendChild(initRunBadge(r.status));
        header.appendChild(document.createTextNode(` · started ${fmtRelative(r.started_at)}`));
        if (r.current_step) header.appendChild(document.createTextNode(` · step ${r.current_step}`));
        if (r.exit_code != null) header.appendChild(document.createTextNode(` · exit ${r.exit_code}`));
        const wasNearBottom = (log.scrollTop + log.clientHeight) >= (log.scrollHeight - 30);
        log.textContent = r.log_text || "";
        if (wasNearBottom) log.scrollTop = log.scrollHeight;
        if (r.status === "running" || r.status === "queued") {
          if (!pollTimer) pollTimer = setInterval(refresh, 1500);
        } else {
          if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
        }
      } catch (err) {
        header.textContent = "Failed: " + err.message;
        if (pollTimer) clearInterval(pollTimer);
      }
    }
    const footer = h("div", { class: "row" },
      h("button", { class: "btn btn-primary", onclick: () => {
        if (pollTimer) clearInterval(pollTimer);
        Modal.close();
      } }, "Close"),
    );
    Modal.open({ title: `Init run #${runId} · ${node.name}`, body: wrap, footer });
    refresh();
  }

  // ----- Initialize wizard -----

  async function openInitializeWizard(node, onDone) {
    // Pull the most up-to-date node row (with all secrets) so we can pre-fill defaults.
    let detail;
    try {
      const resp = await api("GET", `/api/nodes/${encodeURIComponent(node.name)}`);
      detail = resp;
    } catch (err) { toast("error", "Could not load node", err.message); return; }

    // Load local SSH key list as wizard step 1 options.
    let localKeys = [];
    try {
      localKeys = (await api("GET", "/api/host/ssh-keys")).keys || [];
    } catch (err) { /* non-fatal — user can paste manually */ }

    const state = {
      step: 1,
      git_private_key: detail.init_git_private_key || "",
      git_user_name: detail.init_git_user_name || "",
      git_user_email: detail.init_git_user_email || "",
      desired_ssh_port: detail.init_desired_ssh_port || 60101,
      install_codex: detail.init_install_codex !== false,
      codex_base_url: detail.init_codex_base_url || "",
      codex_api_key: detail.init_codex_api_key || "",
      timezone: detail.init_timezone || "Asia/Shanghai",
    };

    const TOTAL_STEPS = 5;
    const wrap = h("div", { id: "init-wizard-body" });
    const footer = h("div", { class: "row", id: "init-wizard-footer" });

    function renderStep() {
      wrap.innerHTML = "";
      footer.innerHTML = "";
      const header = h("div", { class: "muted", style: "font-size: 12px; margin-bottom: 12px" },
        `Step ${state.step} of ${TOTAL_STEPS}`);
      wrap.appendChild(header);
      switch (state.step) {
        case 1: renderKeyStep(); break;
        case 2: renderPortStep(); break;
        case 3: renderCodexStep(); break;
        case 4: renderGitIdentityStep(); break;
        case 5: renderConfirmStep(); break;
        case 6: renderRunStep(); break;
      }
    }

    function navButtons({back = true, nextLabel = "Next →", onNext = () => { state.step++; renderStep(); }} = {}) {
      const f = footer;
      f.innerHTML = "";
      f.appendChild(h("button", { class: "btn", onclick: () => Modal.close() }, "Cancel"));
      if (back && state.step > 1) {
        f.appendChild(h("button", { class: "btn", onclick: () => { state.step--; renderStep(); } }, "← Back"));
      }
      f.appendChild(h("button", { class: "btn btn-primary", onclick: onNext }, nextLabel));
    }

    function renderKeyStep() {
      wrap.appendChild(h("div", { class: "field" },
        h("label", null, "Step 1 · Git deploy key"),
        h("p", { class: "muted", style: "font-size: 13px; margin: 4px 0 12px" },
          "This private key will be installed at /root/.ssh/ on the target server so it can git-clone your private repos."),
      ));
      if (localKeys.length) {
        const list = h("div", { style: "display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px" });
        list.appendChild(h("div", { class: "muted", style: "font-size: 12px" }, "Pick a key from your Mac:"));
        for (const k of localKeys) {
          list.appendChild(h("div", { class: "row", style: "gap: 8px" },
            h("button", { class: "btn btn-sm", onclick: async (e) => {
              e.preventDefault();
              try {
                const r = await api("POST", "/api/host/ssh-keys/read", {path: k.path});
                state.git_private_key = r.content;
                document.getElementById("wiz-key").value = r.content;
                toast("success", "Loaded", k.name);
              } catch (err) { toast("error", "Failed to read", err.message); }
            } }, `Use ${k.name}`),
            h("span", { class: "muted mono", style: "font-size: 11.5px" },
              `${k.type || "?"}  ${k.fingerprint || ""}`),
          ));
        }
        wrap.appendChild(list);
      } else {
        wrap.appendChild(h("div", { class: "muted", style: "font-size: 12px; margin-bottom: 8px" },
          "No keys auto-detected at ~/.ssh — paste one manually below."));
      }
      wrap.appendChild(h("div", { class: "field" },
        h("label", null, "Private key body"),
        h("textarea", { id: "wiz-key", class: "textarea mono", rows: "10",
          placeholder: "-----BEGIN OPENSSH PRIVATE KEY-----\n...\n-----END OPENSSH PRIVATE KEY-----" },
          state.git_private_key || ""),
      ));
      navButtons({ onNext: () => {
        state.git_private_key = document.getElementById("wiz-key").value.trim();
        // Allow skipping for "no git access needed"
        state.step = 2; renderStep();
      } });
    }

    function renderPortStep() {
      wrap.appendChild(h("div", { class: "field" },
        h("label", null, "Step 2 · SSH port"),
        h("p", { class: "muted", style: "font-size: 13px; margin: 4px 0 12px" },
          "Change the SSH port on the target server. After init succeeds the node's stored port will be auto-updated."),
      ));
      wrap.appendChild(h("div", { class: "field" },
        h("label", null, "Desired SSH port (1024-65535)"),
        h("input", { id: "wiz-port", class: "input mono", type: "number", min: "1024", max: "65535",
          value: state.desired_ssh_port }),
        h("div", { class: "muted", style: "font-size: 12px; margin-top: 4px" },
          "Set the same as current (e.g. 22) to keep the existing port."),
      ));
      navButtons({ onNext: () => {
        const v = parseInt(document.getElementById("wiz-port").value || "60101", 10);
        // Allow 22 as the explicit "no change" sentinel (orchestrator skips it).
        if (!(v >= 1 && v < 65536)) { toast("error", "Port must be 1-65535"); return; }
        if (v !== 22 && v < 1024) { toast("error", "Port must be either 22 (no change) or 1024-65535"); return; }
        state.desired_ssh_port = v;
        state.step = 3; renderStep();
      } });
    }

    function renderCodexStep() {
      wrap.appendChild(h("div", { class: "field" },
        h("label", null, "Step 3 · Codex CLI"),
        h("p", { class: "muted", style: "font-size: 13px; margin: 4px 0 12px" },
          "Install the OpenAI Codex CLI and configure its API endpoint."),
      ));
      wrap.appendChild(h("div", { class: "field inline-checkbox" },
        h("input", { id: "wiz-install-codex", type: "checkbox", checked: state.install_codex }),
        h("label", { for: "wiz-install-codex", style: "margin: 0" }, "Install Codex CLI"),
      ));
      wrap.appendChild(h("div", { class: "field" },
        h("label", null, "OPENAI_BASE_URL ", h("span", { class: "hint" }, " — leave blank to use script default")),
        h("input", { id: "wiz-codex-url", class: "input mono", value: state.codex_base_url,
          placeholder: "https://api.openai.com/v1 (or your proxy)" }),
      ));
      wrap.appendChild(h("div", { class: "field" },
        h("label", null, "OPENAI_API_KEY"),
        h("input", { id: "wiz-codex-key", class: "input mono", type: "text", value: state.codex_api_key,
          placeholder: "sk-..." }),
      ));
      navButtons({ onNext: () => {
        state.install_codex = document.getElementById("wiz-install-codex").checked;
        state.codex_base_url = document.getElementById("wiz-codex-url").value.trim();
        state.codex_api_key = document.getElementById("wiz-codex-key").value.trim();
        if (state.install_codex && !state.codex_api_key) {
          if (!confirm("No Codex API key set — continue without configuring API?")) return;
        }
        state.step = 4; renderStep();
      } });
    }

    function renderGitIdentityStep() {
      wrap.appendChild(h("div", { class: "field" },
        h("label", null, "Step 4 · Git identity"),
        h("p", { class: "muted", style: "font-size: 13px; margin: 4px 0 12px" },
          "Used by `git config --global user.name` / `user.email` on the server. The git.sh script auto-detects from GitHub if blank."),
      ));
      wrap.appendChild(h("div", { class: "form-row" },
        h("div", { class: "field" },
          h("label", null, "user.name (optional)"),
          h("input", { id: "wiz-git-name", class: "input", value: state.git_user_name }),
        ),
        h("div", { class: "field" },
          h("label", null, "user.email (optional)"),
          h("input", { id: "wiz-git-email", class: "input", value: state.git_user_email }),
        ),
      ));
      wrap.appendChild(h("div", { class: "field" },
        h("label", null, "Timezone"),
        h("input", { id: "wiz-tz", class: "input mono", value: state.timezone }),
      ));
      navButtons({ onNext: () => {
        state.git_user_name = document.getElementById("wiz-git-name").value.trim();
        state.git_user_email = document.getElementById("wiz-git-email").value.trim();
        state.timezone = document.getElementById("wiz-tz").value.trim() || "Asia/Shanghai";
        state.step = 5; renderStep();
      } });
    }

    function renderConfirmStep() {
      wrap.appendChild(h("div", { class: "field" },
        h("label", null, "Step 5 · Confirm"),
        h("p", { class: "muted", style: "font-size: 13px; margin: 4px 0 12px" },
          `Review the plan. Confirm to save these settings to ${node.name} and start initialization.`),
      ));
      const summary = h("div", { class: "log-viewer", style: "max-height: 320px; font-size: 12.5px" });
      const lines = [
        `Target:               ${node.ssh_user}@${node.host}:${node.ssh_port}`,
        `Timezone:             ${state.timezone}`,
        `Git deploy key:       ${state.git_private_key ? "(set, " + state.git_private_key.length + " bytes)" : "(none — skipped)"}`,
        `Git user.name:        ${state.git_user_name || "(auto)"}`,
        `Git user.email:       ${state.git_user_email || "(auto)"}`,
        `Install Codex CLI:    ${state.install_codex ? "yes" : "no"}`,
        `Codex BASE_URL:       ${state.codex_base_url || "(script default)"}`,
        `Codex API key:        ${state.codex_api_key ? "(set, " + state.codex_api_key.length + " chars)" : "(none — skipped)"}`,
        `Desired SSH port:     ${state.desired_ssh_port}`,
        ``,
        `Steps that will run:`,
        `  1. set-timezone`,
        `  2. install-git`,
        `  3. install-python`,
        `  4. install-node`,
        `  5. install-go`,
        `  6. install-docker`,
        state.git_private_key ? `  7. set-git-key` : `  7. set-git-key  (skipped — no key)`,
        state.install_codex ? `  8. install-codex` : `  8. install-codex  (skipped)`,
        (state.install_codex && state.codex_api_key) ? `  9. set-codex-api` : `  9. set-codex-api  (skipped)`,
        `  10. change-ssh-port → verify → update node row`,
      ];
      summary.appendChild(document.createTextNode(lines.join("\n")));
      wrap.appendChild(summary);
      navButtons({ nextLabel: "Save & Run →", onNext: () => { state.step = 6; renderStep(); kickoffInit(); } });
    }

    function renderRunStep() {
      wrap.appendChild(h("div", { class: "field" },
        h("label", null, "Initializing"),
        h("p", { class: "muted", style: "font-size: 13px; margin: 4px 0 12px" },
          "Live log below. You can close the modal — the job keeps running and will appear in node history when done."),
      ));
      wrap.appendChild(h("div", { id: "wiz-status", class: "muted", style: "margin-bottom: 8px" }, "Starting…"));
      const out = h("pre", { class: "log-viewer", id: "wiz-log", style: "max-height: 420px" });
      wrap.appendChild(out);

      footer.innerHTML = "";
      footer.appendChild(h("button", { class: "btn", onclick: () => Modal.close() }, "Close"));
    }

    let pollTimer = null;
    let currentRunId = null;
    let modalOpen = true;

    async function kickoffInit() {
      const payload = {
        init_git_private_key: state.git_private_key || null,
        init_git_user_name: state.git_user_name || null,
        init_git_user_email: state.git_user_email || null,
        init_desired_ssh_port: state.desired_ssh_port,
        init_install_codex: state.install_codex,
        init_codex_base_url: state.codex_base_url || null,
        init_codex_api_key: state.codex_api_key || null,
        init_timezone: state.timezone,
      };
      try {
        const r = await api("POST", `/api/nodes/${encodeURIComponent(node.name)}/init/start`, payload);
        currentRunId = r.id;
        document.getElementById("wiz-status").textContent = `Run #${r.id} · ${r.status}`;
        startPolling();
      } catch (err) {
        document.getElementById("wiz-status").textContent = `Failed to start: ${err.message}`;
        toast("error", "Init start failed", err.message);
      }
    }

    function startPolling() {
      const poll = async () => {
        if (!currentRunId) return;
        try {
          const r = await api("GET", `/api/nodes/${encodeURIComponent(node.name)}/init/runs/${currentRunId}`);
          if (modalOpen) {
            const statusEl = document.getElementById("wiz-status");
            const logEl = document.getElementById("wiz-log");
            if (statusEl) statusEl.textContent = `Run #${r.id} · ${r.status}` + (r.current_step ? ` · ${r.current_step}` : "");
            if (logEl) {
              const wasNearBottom = (logEl.scrollTop + logEl.clientHeight) >= (logEl.scrollHeight - 30);
              logEl.textContent = r.log_text || "";
              if (wasNearBottom) logEl.scrollTop = logEl.scrollHeight;
            }
          }
          if (r.status === "success" || r.status === "failed" || r.status === "cancelled") {
            clearInterval(pollTimer); pollTimer = null;
            toast(r.status === "success" ? "success" : "error",
              `Init ${r.status}`,
              r.status === "success" ? `Node ${node.name} initialized` : `exit ${r.exit_code}`);
            onDone && onDone();
          }
        } catch (err) {
          // network blip; keep trying
        }
      };
      pollTimer = setInterval(poll, 1500);
      poll();
    }

    // Override Modal.close to stop polling.
    const origClose = Modal.close.bind(Modal);
    const myClose = () => { modalOpen = false; if (pollTimer) clearInterval(pollTimer); origClose(); Modal.close = origClose; };
    Modal.close = myClose;

    Modal.open({ title: `Initialize ${node.name}`, body: wrap, footer: footer });
    renderStep();
  }

  // ----- Services view -----

  async function renderServicesView(root) {
    setActiveNav("services");
    root.innerHTML = "";
    root.appendChild(h("div", { class: "page-header" },
      h("div", null,
        h("h1", null, "Services"),
        h("p", { class: "lede" }, "Deployable services. Each entry points to a GitHub repo + compose file. The Deploy action on a node clones the repo, writes a .env, and runs `docker compose up -d --build`."),
      ),
      h("div", { class: "row" },
        h("button", { class: "btn", onclick: () => renderServicesView(root) }, "Refresh"),
        App.mode === "readwrite"
          ? h("button", { class: "btn btn-primary", onclick: () => openServiceModal(null, () => renderServicesView(root)) }, "+ Add service")
          : null,
      ),
    ));
    const card = h("div", { class: "card" });
    card.appendChild(h("div", { class: "card-header" }, h("h2", null, "Catalog"), h("span", { class: "hint", id: "services-count" })));
    const body = h("div", { class: "card-body tight" });
    card.appendChild(body);
    root.appendChild(card);
    try {
      // Pull catalog + summary in parallel — summary is the new
      // /api/services-summary that joins service_node_state to give
      // per-service running/absent/unhealthy counts. Fall back to
      // catalog-only on older backends that don't have the endpoint.
      const [resp, summaryResp] = await Promise.all([
        api("GET", "/api/services"),
        api("GET", "/api/services-summary").catch((err) => {
          if (err.status === 404) return { services: [] };
          throw err;
        }),
      ]);
      const rows = resp.services || [];
      const summaryByName = {};
      for (const s of (summaryResp.services || [])) summaryByName[s.name] = s;
      document.getElementById("services-count").textContent = `${rows.length} service${rows.length === 1 ? "" : "s"}`;
      if (!rows.length) {
        body.appendChild(h("div", { class: "empty" },
          h("div", { class: "title" }, "No services registered"),
          h("div", { class: "sub" }, App.mode === "readwrite" ? "Add your first service to make it deployable from the Nodes page." : "Read-only admin.")));
      } else {
        body.appendChild(renderServicesTable(rows, summaryByName));
      }
    } catch (err) {
      if (err.status === 401) showLogin();
      else toast("error", "Failed to load services", err.message);
    }
  }

  function renderServicesTable(services, summaryByName) {
    summaryByName = summaryByName || {};
    const table = h("table", { class: "data" });
    table.appendChild(h("thead", null,
      h("tr", null,
        h("th", null, "Name"),
        h("th", null, "Repo"),
        h("th", null, "Manifest"),
        h("th", null, "Per-node status"),
        h("th", null, "Branch"),
        h("th", null, "Updated"),
        h("th", null, ""),
      ),
    ));
    const tbody = h("tbody");
    for (const s of services) {
      const actions = h("td", { class: "actions" });
      actions.appendChild(h("button", { class: "btn btn-sm",
        title: s.has_manifest ? "Re-fetch .deploy.yaml from GitHub" : "Pull .deploy.yaml from GitHub",
        onclick: () => fetchServiceManifest(s.name, true)
      }, s.has_manifest ? "Sync" : "Sync manifest"));
      actions.appendChild(h("button", { class: "btn btn-sm btn-primary",
        title: "Deploy this service to one or more nodes",
        onclick: () => openServiceDeployModal(s)
      }, "Deploy…"));
      actions.appendChild(h("button", { class: "btn btn-sm",
        onclick: () => openServiceHistoryModal(s.name) }, "History"));
      actions.appendChild(h("button", { class: "btn btn-sm",
        onclick: () => openServiceModal(s, () => renderServicesView(document.getElementById("view-root")))
      }, "Edit"));
      if (App.mode === "readwrite") {
        actions.appendChild(h("button", { class: "btn btn-sm btn-danger",
          onclick: async () => {
            if (!confirm(`Delete service ${s.name}?`)) return;
            try {
              await api("DELETE", `/api/services/${encodeURIComponent(s.name)}`);
              toast("success", "Deleted", s.name);
              renderServicesView(document.getElementById("view-root"));
            } catch (err) { toast("error", "Delete failed", err.message); }
          } }, "✕"));
      }
      const manifestCell = h("td", null);
      if (s.has_manifest) {
        manifestCell.appendChild(h("span", { class: "badge ok" }, "loaded"));
        if ((s.required_env || []).length) {
          manifestCell.appendChild(h("span", { class: "muted",
            style: "margin-left: 6px; font-size: 11px;" },
            `requires ${s.required_env.length} env`));
        }
        if ((s.exposed_ports || []).length) {
          manifestCell.appendChild(h("span", { class: "muted",
            style: "margin-left: 6px; font-size: 11px;" },
            `port ${s.exposed_ports.join(",")}`));
        }
      } else {
        manifestCell.appendChild(h("span", { class: "badge warn" }, "not synced"));
      }
      const summary = summaryByName[s.name] || { running: 0, unhealthy: 0, absent: 0, total: 0, other: 0 };
      const fleetCell = h("td", { style: "cursor: pointer", title: "Click to view per-node status",
        onclick: () => openServiceFleetModal(s.name) });
      if (summary.total === 0) {
        fleetCell.appendChild(h("span", { class: "muted", style: "font-size: 12px" }, "no nodes yet"));
      } else {
        if (summary.running) {
          fleetCell.appendChild(h("span", { class: "badge ok" },
            h("span", { class: "dot" }), `${summary.running} running`));
        }
        if (summary.unhealthy) {
          fleetCell.appendChild(h("span", { class: "badge danger", style: "margin-left: 4px" },
            h("span", { class: "dot" }), `${summary.unhealthy} unhealthy`));
        }
        if (summary.absent) {
          fleetCell.appendChild(h("span", { class: "badge", style: "margin-left: 4px" },
            `${summary.absent} absent`));
        }
        if (!summary.running && !summary.unhealthy && !summary.absent && summary.other) {
          fleetCell.appendChild(h("span", { class: "badge warn" }, `${summary.other} other`));
        }
      }
      tbody.appendChild(h("tr", null,
        h("td", { class: "domain" }, s.name,
          s.description ? h("div", { class: "muted", style: "font-size: 11px; margin-top: 2px" }, s.description) : null),
        h("td", { class: "mono", style: "font-size: 12px" }, s.github_repo_url),
        manifestCell,
        fleetCell,
        h("td", { class: "mono", style: "font-size: 12px" }, s.default_branch),
        h("td", { class: "muted" }, fmtRelative(s.updated_at)),
        actions,
      ));
    }
    table.appendChild(tbody);
    const wrap = h("div", { class: "table-wrap" });
    wrap.appendChild(table);
    return wrap;
  }

  async function fetchServiceManifest(name, refresh) {
    toast("info", "Syncing", `Fetching .deploy.yaml from ${name}…`);
    try {
      const r = await api("POST", `/api/services/${encodeURIComponent(name)}/manifest`,
        { save: true });
      toast("success", "Manifest synced",
        `${name} · branch=${r.branch_used} · ${(r.manifest.required_env || []).length} required env`);
      if (refresh) renderServicesView(document.getElementById("view-root"));
    } catch (err) { toast("error", "Sync failed", err.message); }
  }

  async function openServiceDeployModal(service) {
    let manifest = null;
    try {
      // Always re-parse from cached deploy_yaml if available; otherwise fetch.
      if (service.has_manifest && service.deploy_yaml) {
        manifest = parseInlineManifest(service);
      } else {
        const r = await api("POST", `/api/services/${encodeURIComponent(service.name)}/manifest`,
          { save: true });
        manifest = r.manifest;
      }
    } catch (err) { toast("error", "Could not load manifest", err.message); return; }

    const form = h("form");
    form.appendChild(h("p", { class: "muted" },
      "Deploy ", h("strong", null, service.name),
      " — git: ", h("span", { class: "mono" }, service.github_repo_url),
      ". The platform will clone, write .env, run ",
      h("span", { class: "mono" }, "docker compose up -d --build"),
      ", and verify the healthcheck before marking each node successful."));

    // Revision pin
    form.appendChild(h("div", { class: "form-row" },
      h("div", { class: "field" },
        h("label", null, "Revision ", h("span", { class: "hint" },
          " — git SHA, tag, or branch. Default: ", h("span", { class: "mono" }, service.default_branch || "main"))),
        h("input", { id: "svc-revision", class: "input mono",
          placeholder: service.default_branch || "main", value: "" })),
      h("div", { class: "field" },
        h("label", null, "Triggered by ", h("span", { class: "hint" }, " — record only")),
        h("input", { id: "svc-triggered-by", class: "input", value: "admin" })),
    ));

    // Env overrides — show defaults + required highlighted
    const envWrap = h("div", { class: "field" },
      h("label", null, "Environment ", h("span", { class: "hint" },
        " — required fields in red MUST be filled; others use the default")));
    const envTable = h("table", { class: "data", style: "width: 100%; font-size: 12.5px;" });
    envTable.appendChild(h("thead", null, h("tr", null,
      h("th", null, "Variable"), h("th", null, "Default"), h("th", null, "Override (per-deploy)"))));
    const envBody = h("tbody");
    const allKeys = new Set([
      ...(manifest.required_env || []),
      ...Object.keys(manifest.defaults || {}),
      ...Object.keys(service.default_env || {}),
    ]);
    for (const key of Array.from(allKeys).sort()) {

          .map(c => c.getAttribute("data-node"));

        const env = {};
        form.querySelectorAll('input[data-env-key]').forEach(inp => {

        const payload = {
          nodes,
          env,

          triggered_by: document.getElementById("svc-triggered-by").value.trim() || "admin",

      } }, "Deploy"),

    Modal.open({ title: `Deploy ${service.name}`, body: form, footer });

  // Per-service "Fleet" modal: live container state per node, with a
  // Refresh button that fans out probes to all nodes that have a row
  // for this service. Generic — works for ssl-service, api-gateway, etc.
  //
  // All DOM refs are kept in closure (NOT looked up via getElementById)
  // so two modals opened in quick succession can't write into each
  // other's elements (review R12.1).
  async function openServiceFleetModal(serviceName) {
    const body = h("div");
    const stampEl = h("div", { class: "muted", style: "flex: 1; font-size: 12px;" }, "Loading…");
    const refreshBtn = h("button", { class: "btn btn-sm",
      onclick: () => refreshFleet() }, "Refresh");
    const header = h("div", { class: "row",
      style: "gap: 8px; align-items: center; margin-bottom: 12px;" },
      stampEl, refreshBtn);
    body.appendChild(header);
    const tableWrap = h("div", null,
      h("div", { class: "muted", style: "padding: 16px; text-align: center" }, "Loading…"));
    body.appendChild(tableWrap);

    const renderTable = (states) => {
      tableWrap.innerHTML = "";
      if (!states || !states.length) {
        tableWrap.appendChild(h("div", { class: "empty" },
          h("div", { class: "title" }, "No node state yet"),
          h("div", { class: "sub" }, "Deploy this service to a node to see it appear here.")));
        return;
      }
      const tbl = h("table", { class: "data" });
      tbl.appendChild(h("thead", null, h("tr", null,
        h("th", null, "Node"),
        h("th", null, "Container"),
        h("th", null, "Image"),
        h("th", null, "Health"),
        h("th", null, "Last seen"),
        h("th", null, "Last deploy"),
        h("th", null, ""),
      )));
      const tb = h("tbody");
      const stateBadge = (s) => {
        const t = (s || "").toLowerCase();
        if (t === "running") return h("span", { class: "badge ok" }, h("span", { class: "dot" }), "running");
        if (t === "absent") return h("span", { class: "badge" }, "absent");
        if (t === "exited" || t === "dead") return h("span", { class: "badge danger" }, h("span", { class: "dot" }), t);
        if (t === "restarting" || t === "created" || t === "paused") return h("span", { class: "badge warn" }, h("span", { class: "dot" }), t);
        return h("span", { class: "badge muted" }, t || "unknown");
      };
      const healthBadge = (ok) => {
        if (ok === true) return h("span", { class: "badge ok" }, "✓");
        if (ok === false) return h("span", { class: "badge danger" }, "✗");
        return h("span", { class: "muted" }, "—");
      };
      for (const st of states) {
        tb.appendChild(h("tr", null,
          h("td", { class: "mono" }, st.node_name),
          h("td", null, stateBadge(st.container_state)),
          h("td", { class: "mono", style: "font-size: 11.5px" }, st.container_image || "—"),
          h("td", null, healthBadge(st.healthcheck_ok)),
          h("td", { class: "muted", style: "font-size: 12px" },
            st.last_observed_at ? fmtRelative(st.last_observed_at) : "never"),
          h("td", { class: "muted", style: "font-size: 12px" },
            st.status ? `${st.status}${st.revision ? " · " + st.revision.slice(0, 7) : ""}` : "—"),
          h("td", null,
            h("button", { class: "btn btn-sm", title: "Probe just this node",
              onclick: async (e) => {
                e.preventDefault();
                e.target.disabled = true;
                e.target.textContent = "Probing…";
                try { await probeNode(st.node_name); await loadFleet(false); }
                catch (err) { toast("error", "Probe failed", err.message); }
                finally { /* row replaced */ }
              } }, "Probe"),
          ),
        ));
      }
      tbl.appendChild(tb);
      const wrap = h("div", { class: "table-wrap" });
      wrap.appendChild(tbl);
      tableWrap.appendChild(wrap);
    };

    const loadFleet = async (showSpinner = true) => {
      if (showSpinner) {
        tableWrap.innerHTML = "";
        tableWrap.appendChild(h("div", { class: "muted", style: "padding: 16px; text-align: center" }, "Loading…"));
      }
      try {
        const r = await api("GET", `/api/services/${encodeURIComponent(serviceName)}/nodes`);
        renderTable(r.states || []);
        const newest = (r.states || []).reduce((a, b) =>
          (a && a.last_observed_at && (!b.last_observed_at || a.last_observed_at > b.last_observed_at)) ? a : b, null);
        if (newest && newest.last_observed_at) {
          stampEl.textContent = `Last observed: ${fmtRelative(newest.last_observed_at)}`;
        } else {
          stampEl.textContent = "Never observed";
        }
      } catch (err) {
        if (err.code === "service_not_found") {
          toast("error", "Service not registered", `${serviceName} isn't in the catalog`);
          Modal.close();
          return;
        }
        tableWrap.innerHTML = "";
        tableWrap.appendChild(h("div", { class: "muted", style: "padding: 16px; color: var(--danger)" },
          "Load failed: " + (err.message || "")));
      }
    };

    const refreshFleet = async () => {
      refreshBtn.disabled = true;
      refreshBtn.textContent = "Refreshing…";
      stampEl.textContent = "Probing all nodes…";
      try {
        const r = await api("POST", `/api/services/${encodeURIComponent(serviceName)}/refresh`, {});
        if (r && r.message) {
          // Backend signaled "no node has a state row yet — deploy first".
          stampEl.textContent = r.message;
          renderTable([]);
        } else {
          // Per-node failures (SSH timeout, host down) come back in r.errors.
          // Surface them so the user knows the refreshed numbers don't
          // cover every node (review pass-3 R3.12).
          if (r && Array.isArray(r.errors) && r.errors.length) {
            const total = r.total || (r.refreshed + r.errors.length);
            const sample = r.errors.slice(0, 3)
              .map((e) => `${e.node || "?"}: ${e.error || "fail"}`).join(" · ");
            const more = r.errors.length > 3 ? ` (+${r.errors.length - 3} more)` : "";
            toast("error",
              `${r.errors.length}/${total} nodes failed to refresh`,
              sample + more);
          }
          await loadFleet(false);
        }
      } catch (err) {
        if (err.code === "service_not_found") {
          toast("error", "Service not registered", `${serviceName} isn't in the catalog`);
          Modal.close();
          return;
        }
        toast("error", "Refresh failed", err.message);
      } finally {
        refreshBtn.disabled = false;
        refreshBtn.textContent = "Refresh";
      }
    };

    Modal.open({
      title: `${serviceName} · Per-node status`,
      body,
      footer: h("div", { class: "row" },
        h("button", { class: "btn", onclick: () => openServiceHistoryModal(serviceName) }, "Deploy history"),
        h("div", { style: "flex: 1" }),
        h("button", { class: "btn btn-primary", onclick: () => Modal.close() }, "Close"),
      ),
    });
    loadFleet(true);
  }

  function envDictToText(envDict) {
    if (!envDict) return "";
    return Object.entries(envDict).map(([k, v]) => `${k}=${v}`).join("\n");
  }
  function envTextToDict(text) {
    const out = {};
    for (const raw of (text || "").split(/\r?\n/)) {
      const line = raw.trim();
      if (!line || line.startsWith("#")) continue;
      const eq = line.indexOf("=");
      if (eq < 0) continue;
      const k = line.slice(0, eq).trim();
      const v = line.slice(eq + 1);
      if (k) out[k] = v;
    }
    return out;
  }

      } }, isEdit ? "Save" : "Add service"),

  // ----- Static IPs view -----

  // Per-row loop-test timers that survive view re-renders within the
  // same #/static-ips session. Cleared when the user navigates away.
  const StaticIpLoopState = {
    timers: new Map(),    // id -> setInterval handle
    seconds: new Map(),   // id -> chosen seconds
    statuses: new Map(),  // id -> latest result {success, latency_ms, error, at}
    onTickCallbacks: new Set(),
    start(id, seconds, runOnce) {
      this.stop(id);
      this.seconds.set(id, seconds);
      const handle = setInterval(() => runOnce(id), seconds * 1000);
      this.timers.set(id, handle);
      runOnce(id);
    },
    stop(id) {
      const t = this.timers.get(id);
      if (t) clearInterval(t);
      this.timers.delete(id);
      this.seconds.delete(id);
    },
    stopAll() {
      for (const t of this.timers.values()) clearInterval(t);
      this.timers.clear();
      this.seconds.clear();
      // statuses is cosmetic (used to show fresh badges in the table) —
      // wipe it too so we don't carry stale "ok" indicators into a
      // future visit when the DB has since changed.
      this.statuses.clear();
    },
    isRunning(id) { return this.timers.has(id); },
  };

  function ipResultBadge(success, latency, error, at) {
    if (success === null || success === undefined)
      return h("span", { class: "badge" }, "—");
    if (success) {
      const text = (latency != null) ? `ok · ${latency}ms` : "ok";
      const b = h("span", { class: "badge ok", title: at ? fmtDate(at) : "" }, h("span", { class: "dot" }), text);
      return b;
    }
    return h("span", { class: "badge danger", title: error || "" }, h("span", { class: "dot" }), "fail");
  }

  function ipUnlockBadge(item) {
    const s = (item.status || "").toLowerCase();
    if (s === "available" || s === "full") return h("span", { class: "badge ok" }, item.service);
    if (s === "originals_only") return h("span", { class: "badge warn" }, item.service + " · originals");
    if (s === "blocked") return h("span", { class: "badge danger" }, item.service + " · blocked");
    if (s === "error") return h("span", { class: "badge" }, item.service + " · err");
    return h("span", { class: "badge" }, item.service + " · ?");
  }

      ...["country", "provider", "ip", "created"].map(opt =>
        h("button", { class: "btn btn-sm" + (opt === currentSort ? " btn-primary" : ""),
          onclick: () => { currentSort = opt; renderStaticIpsView(root, { sort: opt }); } },

    // Card with table

    root.appendChild(card);

    try {

        ));

  function renderStaticIpsTable(ips) {

        h("th", null, "Loop"),
        h("th", null, ""),
      ),
    ));
    const tbody = h("tbody");
    for (const r of ips) {
      const liveStatus = StaticIpLoopState.statuses.get(r.id);
      const lastSuccess = liveStatus ? liveStatus.success : r.last_test_success;
      const lastLatency = liveStatus ? liveStatus.latency_ms : r.last_test_latency_ms;
      const lastError = liveStatus ? liveStatus.error : r.last_test_error;
      const lastAt = liveStatus ? liveStatus.at : r.last_test_at;

      const actions = h("td", { class: "actions" });
      actions.appendChild(h("button", { class: "btn btn-sm",
        onclick: async () => { await runSingleTest(r.id); }
      }, "Test"));
      actions.appendChild(h("button", { class: "btn btn-sm",

      }, "Probe"));

      }, "Details"));
      if (App.mode === "readwrite") {

        }, "Edit"));

        }, "✕"));
      }

      const loopRunning = StaticIpLoopState.isRunning(r.id);
      const loopBtn = h("button", {
        class: "btn btn-sm" + (loopRunning ? " btn-primary" : ""),
        onclick: () => toggleLoop(r),
      }, loopRunning ? `Stop (${StaticIpLoopState.seconds.get(r.id)}s)` : "▶ Loop");

      const tr = h("tr", { "data-ip": r.id },

        h("td", null, r.provider || h("span", { class: "muted" }, "—")),
        h("td", null, ipResultBadge(lastSuccess, lastLatency, lastError, lastAt),
          lastAt ? h("div", { class: "muted", style: "font-size: 11px; margin-top: 2px" }, fmtRelative(lastAt)) : null),
        h("td", null, loopBtn),
        actions,
      );

      // Static info preview row (when present)
      if (r.static_info && (r.static_info.geo || (r.static_info.unlock || []).length)) {
        const detailCells = [];
        const geo = r.static_info.geo || {};
        if (geo.country || geo.country_code) detailCells.push(`geo: ${geo.country || ""} ${geo.country_code ? "(" + geo.country_code + ")" : ""}`);
        if (geo.city) detailCells.push(`city: ${geo.city}`);
        if (geo.org) detailCells.push(`org: ${geo.org}`);
        if (geo.asn) detailCells.push(`asn: ${geo.asn}`);
        const wrap = h("div", { class: "row", style: "flex-wrap: wrap; gap: 4px;" });
        for (const u of (r.static_info.unlock || [])) wrap.appendChild(ipUnlockBadge(u));

          const cell = h("td", { colspan: "8", class: "muted", style: "font-size: 11.5px; padding: 6px 16px" },
            detailCells.join("  ·  "),
            detailCells.length && wrap.childNodes.length ? "  " : null,
            wrap.childNodes.length ? wrap : null,
          );
          tbody.appendChild(h("tr", { style: "background: var(--surface-alt)" }, cell));
        }
      }
    }
    table.appendChild(tbody);
    const wrap = h("div", { class: "table-wrap" });
    wrap.appendChild(table);
    return wrap;

  function toggleLoop(row) {
    if (StaticIpLoopState.isRunning(row.id)) {
      StaticIpLoopState.stop(row.id);
      renderStaticIpsView(document.getElementById("view-root"), {});
      return;
    }
    // Ask user for interval
    const form = h("form");
    form.appendChild(h("div", { class: "field" },
      h("label", null, "Interval (seconds)"),
      h("input", { id: "loop-interval", class: "input mono", type: "number", min: "1", value: row.loop_test_seconds || 10 }),
    ));
    const footer = h("div", { class: "row" },
      h("button", { type: "button", class: "btn", onclick: () => Modal.close() }, "Cancel"),
      h("button", { type: "button", class: "btn btn-primary", onclick: async () => {
        const sec = Math.max(1, parseInt(document.getElementById("loop-interval").value, 10) || 10);
        Modal.close();
        // Persist preference
        try { await api("PATCH", `/api/static-ips/${row.id}`, { loop_test_seconds: sec }); } catch (_) {}
        StaticIpLoopState.start(row.id, sec, async (id) => {
          try {
            const r = await api("POST", `/api/static-ips/${id}/test`, { kind: "loop" });
            StaticIpLoopState.statuses.set(id, {
              success: r.result.success,
              latency_ms: r.result.latency_ms,
              error: r.result.error,
              at: new Date().toISOString(),
            });
            renderStaticIpsView(document.getElementById("view-root"), {});
          } catch (err) {
            toast("error", "Loop test failed", err.message);
            StaticIpLoopState.stop(id);
          }
        });
        renderStaticIpsView(document.getElementById("view-root"), {});
      } }, "Start"),
    );
    Modal.open({ title: `Loop test ${row.ip}`, body: form, footer });
  }

  async function runSingleTest(id) {

      if (r.result.success) toast("success", "Test ok", `${r.ip} · ${r.result.latency_ms ?? ""}ms`);
      else toast("error", "Test failed", r.result.error || `${r.ip} unreachable`);
      renderStaticIpsView(document.getElementById("view-root"), {});

      toast("error", "Test failed", err.message);

  async function runTestAll() {
    const btn = document.getElementById("btn-test-all");
    if (btn) { btn.setAttribute("disabled", "true"); btn.textContent = "Testing…"; }
    try {
      const r = await api("POST", "/api/static-ips/test-all");
      openTestAllReportModal(r);
      renderStaticIpsView(document.getElementById("view-root"), {});
      const persistFail = (r.errors || []).length;
      const tone = (r.fail === 0 && persistFail === 0) ? "success" : (persistFail ? "error" : "info");
      const detail = `${r.success}/${r.total} ok · ${r.fail} failed`
        + (persistFail ? ` · ${persistFail} persist errors` : "");
      toast(tone, "Test-all complete", detail);
    } catch (err) {
      toast("error", "Test-all failed", err.message);
    } finally {
      if (btn) { btn.removeAttribute("disabled"); btn.textContent = "▶ Test all"; }

      " (so the node can use this identity to authenticate to GitHub or anywhere this public key is trusted). ",

    // Node multi-select with Select all / Clear ----------------------

      h("label", null, "Nodes"));
    const toolbar = h("div", { class: "row", style: "gap: 6px; margin-bottom: 6px;" },

      style: "max-height: 260px; overflow-y: auto; border: 1px solid var(--border); border-radius: 6px; padding: 6px; background: var(--surface);",
    });
    listWrap.appendChild(list);
    form.appendChild(listWrap);

    function updateCount() {
      const n = form.querySelectorAll('input[type="checkbox"][data-node]:checked').length;
      const el = document.getElementById("deploy-count");
      if (el) el.textContent = `${n} selected`;
    }

    try {
      const r = await api("GET", "/api/nodes");
      const nodes = r.nodes || [];
      if (!nodes.length) {
        list.appendChild(h("div", { class: "muted", style: "padding: 8px;" }, "No nodes registered. Add some on the Nodes page first."));
      } else {
        for (const n of nodes) {
          const id = `dn-${n.name}`;
          const row = h("label", { class: "row",
            style: "gap: 8px; padding: 4px 6px; cursor: pointer; align-items: center;",
            for: id },
            h("input", { type: "checkbox", id, "data-node": n.name, onchange: updateCount }),
            h("span", { class: "mono" }, n.name),
            h("span", { class: "muted", style: "font-size: 11.5px;" },
              ` ${n.ssh_user}@${n.host}:${n.ssh_port}`),
            h("span", { class: "badge",
              style: "margin-left: auto; font-size: 10.5px;" }, n.auth_method),
          );
          list.appendChild(row);
        }
      }
    } catch (err) { toast("error", "Could not list nodes", err.message); }

    // Deploy actions ---------------------------------------------------
    const deployBar = h("div", { class: "row",
      style: "gap: 8px; margin-top: 16px; padding-top: 12px; border-top: 1px solid var(--border);" });

    function selectedNodes() {
      return Array.from(form.querySelectorAll('input[type="checkbox"][data-node]:checked'))
        .map(c => c.getAttribute("data-node"));
    }
    async function doDeploy(mode) {
      const nodes = selectedNodes();
      if (!nodes.length) {
        toast("error", "No nodes selected", "Pick at least one node or click Select all");
        return;
      }
      const modeLabel = { public: "public key", private: "private key", both: "public + private" }[mode];
      // For destructive private-key writes, confirm first.
      if (mode === "private" || mode === "both") {
        if (!confirm(`Push ${modeLabel} to ${nodes.length} node(s)?\n\nThe private key will be written to ~/.ssh/${keyName} on each target. Anyone with shell on that node will be able to read it.`)) return;
      }
      const btns = deployBar.querySelectorAll("button");
      btns.forEach(b => b.setAttribute("disabled", "true"));
      try {
        const r = await api("POST", `/api/ssh-keys/${keyId}/deploy`,
          { nodes, mode });
        Modal.close();
        openDeployResultModal(r);
        toast(r.fail === 0 ? "success" : "info", "Deploy complete",
          `${r.success}/${r.total} ok · ${r.fail} failed`);
        if (onSaved) onSaved();
      } catch (err) {
        toast("error", "Deploy failed", err.message);
      } finally {
        btns.forEach(b => b.removeAttribute("disabled"));
      }
    }
    deployBar.appendChild(h("button", { type: "button", class: "btn",
      onclick: () => Modal.close() }, "Cancel"));
    deployBar.appendChild(h("div", { style: "flex: 1;" }));
    deployBar.appendChild(h("button", { type: "button", class: "btn",
      title: "Append public key to authorized_keys",
      onclick: () => doDeploy("public") }, "📤 Push public"));
    deployBar.appendChild(h("button", { type: "button", class: "btn",
      title: "Write private+public key files to ~/.ssh/<name>",
      onclick: () => doDeploy("private") }, "🔐 Push private"));
    deployBar.appendChild(h("button", { type: "button", class: "btn btn-primary",
      title: "Do both (push public + push private)",
      onclick: () => doDeploy("both") }, "📤🔐 Push both"));

    Modal.open({ title: `Deploy ${keyName}`, body: form, footer: deployBar });
  }

  async function renderLogsView(root) {
    setActiveNav("logs");
    root.innerHTML = "";
    root.appendChild(h("div", { class: "page-header" },
      h("div", null,
        h("h1", null, "Logs"),
        h("p", { class: "lede" }, "Tail the most recent lines of the controller and Caddy logs."),
      ),
    ));

    const tabs = h("div", { class: "tabs" });
    const controllerTab = h("div", { class: "tab active", "data-which": "controller" }, "Controller");
    const caddyTab = h("div", { class: "tab", "data-which": "caddy" }, "Caddy");
    tabs.appendChild(controllerTab);
    tabs.appendChild(caddyTab);
    root.appendChild(tabs);

    const row = h("div", { class: "row between", style: "margin-bottom: 12px" },
      h("div", { class: "muted", id: "log-meta" }, ""),
      h("div", { class: "row" },
        h("label", { class: "muted" }, "Tail: "),
        (() => {
          const sel = h("select", { class: "select", id: "log-tail" });
          for (const n of [100, 500, 1000, 2000, 5000]) sel.appendChild(h("option", { value: String(n) }, `${n} lines`));
          sel.value = "500";
          sel.addEventListener("change", reload);
          return sel;
        })(),
        h("button", { class: "btn btn-sm", onclick: reload }, "Refresh"),
        (() => {
          const auto = h("label", { class: "inline-checkbox" },
            h("input", { type: "checkbox", id: "log-auto" }), " Auto-refresh");
          return auto;
        })(),
      ),
    );
    root.appendChild(row);

    const card = h("div", { class: "card" });
    const body = h("div", { class: "card-body" });
    const viewer = h("div", { class: "log-viewer", id: "log-viewer" }, h("span", { class: "dim" }, "Loading…"));
    body.appendChild(viewer);
    card.appendChild(body);
    root.appendChild(card);

    let which = "controller";
    let autoTimer = null;

    controllerTab.addEventListener("click", () => { which = "controller"; controllerTab.classList.add("active"); caddyTab.classList.remove("active"); reload(); });
    caddyTab.addEventListener("click", () => { which = "caddy"; caddyTab.classList.add("active"); controllerTab.classList.remove("active"); reload(); });

    async function reload() {
      const tail = document.getElementById("log-tail").value || "500";
      try {
        const resp = await api("GET", `/api/logs?which=${encodeURIComponent(which)}&tail=${encodeURIComponent(tail)}`);
        viewer.innerHTML = "";
        document.getElementById("log-meta").textContent = `${resp.path}`;
        if (!resp.lines || !resp.lines.length) {
          viewer.appendChild(h("span", { class: "dim" }, "(no log lines yet)"));
        } else {
          viewer.appendChild(document.createTextNode(resp.lines.join("\n")));
        }
        viewer.scrollTop = viewer.scrollHeight;
      } catch (err) {
        if (err.status === 401) showLogin();
        else toast("error", "Could not read log", err.message);
      }
    }

    document.getElementById("log-auto").addEventListener("change", (e) => {
      if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
      if (e.target.checked) autoTimer = setInterval(reload, 3000);
    });

    reload();
    // cleanup on leaving view
    App._leaveCurrent = () => { if (autoTimer) clearInterval(autoTimer); };
  }

  // Databases — multi-DB registry + cross-DB sync. The currently-
  // connected DSN is auto-registered; users can add more, edit labels
  // and DSNs, mark a "primary on next restart", and sync between any
  // two of them via an analyze-first preview.

  async function renderDatabasesView(root) {
    setActiveNav("databases");
    root.innerHTML = "";
    root.appendChild(h("div", { class: "page-header" },
      h("div", null,
        h("h1", null, "Databases"),
        h("p", { class: "lede" },
