mode: readonly

postgres:
  dsn: "postgresql://postgres:change-me@db.example.supabase.co:5432/postgres"

sync:
  poll_interval_seconds: 30
  renew_before_days: 30
  retry_backoff_seconds: 3600
  loop_error_backoff_seconds: 10

paths:
  state_dir: /var/lib/ssl-proxy
  log_dir: /var/log/ssl-proxy
  caddy_binary: /usr/bin/caddy
  certbot_binary: /usr/bin/certbot

caddy:
  admin_url: http://127.0.0.1:2019
  reload_command:
    - /usr/bin/caddy
    - reload
    - --config
    - /var/lib/ssl-proxy/generated/Caddyfile
    - --adapter
    - caddyfile

acme:
  email: ops@example.com
  staging: false
  webroot: /var/lib/ssl-proxy/acme-webroot
  certbot_args: []

logging:
  level: INFO
