mode: readonly

postgres:
  dsn: "postgresql://postgres:change-me@db.example.supabase.co:5432/postgres"

sync:
  poll_interval_seconds: 30
  renew_before_days: 30
  retry_backoff_seconds: 3600
  loop_error_backoff_seconds: 10

paths:
  state_dir: /app/state
  log_dir: /app/logs
  caddy_binary: /usr/bin/caddy
  certbot_binary: /usr/local/bin/certbot

caddy:
  admin_url: http://127.0.0.1:2019
  reload_command:
    - /usr/bin/caddy
    - reload
    - --config
    - /app/state/generated/Caddyfile
    - --adapter
    - caddyfile

acme:
  email: domain@bitsfactor.com
  staging: false
  challenge_type: dns-01
  dns_provider: cloudflare
  dns_propagation_seconds: 30
  certbot_args: []

logging:
  level: INFO

# Web admin backend (optional). When enabled, a small HTTP server is exposed
# on the bind/port below and serves both the REST API under /api/* and the
# single-page admin UI at /. All /api/* requests require a bearer token equal
# to admin.token (via `Authorization: Bearer ...` or `X-Admin-Token` header).
admin:
  enabled: false
  bind: 127.0.0.1
  port: 8088
  token: ""
